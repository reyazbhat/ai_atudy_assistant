<!DOCTYPE html>
<html>
<head>
    <title>Upload</title>
</head>
<body>
    <h1>Upload PDF</h1>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Upload</button>
        {% comment %} {% if success %}
        <p>{{ success }}</p>
        {% endif %}
        <p>{{ Kaar Fail }}</p> {% endcomment %}
        {% if success %}
        <p>{{ success }}</p>
        {% endif %}
    </form>
    <a href="http://127.0.0.1:8000/{{ note.id }}/">
    View Note
</a>
</body>
</html>
