<!DOCTYPE html>
<html>
<head>
    <title>{{ note.title }}</title>
</head>
<body>

    <a href="/">← Back</a>

    <h1>{{ note.title }}</h1>

    <hr>

    <p>{{ note.content }}</p>

    <h2>Ask AI</h2>

<form method="POST">
    {% csrf_token %}
    
    <input type="text" name="question" placeholder="Ask something...">

    <button type="submit">
        Ask
    </button>
</form>

{% if answer %}
    <h3>Answer:</h3>
    <p>{{ answer }}</p>
{% endif %}
</body>
</html>
